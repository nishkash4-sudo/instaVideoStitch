<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>InstaStitch</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

    :root {
      --ig1: #f58529;
      --ig2: #dd2a7b;
      --ig3: #8134af;
      --ig4: #515bd4;
      --bg: #080810;
      --surface: #0f0f1a;
      --surface2: #161625;
      --border: rgba(255,255,255,0.07);
      --text: #f0f0f8;
      --text-muted: #6b6b8a;
      --success: #4ade80;
      --warn: #facc15;
      --err: #f87171;
      --purple: #a78bfa;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 16px 80px;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: -200px; left: 50%;
      transform: translateX(-50%);
      width: 800px; height: 500px;
      background: radial-gradient(ellipse, rgba(131,52,175,0.18) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 620px;
      padding-top: 56px;
    }

    /* ── Header ── */
    .header {
      text-align: center;
      margin-bottom: 36px;
    }

    .logo {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }

    .logo-icon {
      width: 44px; height: 44px;
      background: linear-gradient(135deg, var(--ig1), var(--ig2), var(--ig3));
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      box-shadow: 0 0 24px rgba(221,42,123,0.35);
      transition: transform 0.3s ease;
    }

    h1 {
      font-size: 1.7rem;
      font-weight: 800;
      background: linear-gradient(90deg, var(--ig1), var(--ig2), var(--ig3), var(--ig4));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
    }

    .subtitle {
      color: var(--text-muted);
      font-size: 0.88rem;
      line-height: 1.5;
    }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 24px 28px;
      margin-bottom: 14px;
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
    }

    .card-title {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
    }

    .link-counter {
      font-size: 0.73rem;
      font-weight: 600;
      color: var(--purple);
      background: rgba(167,139,250,0.1);
      border: 1px solid rgba(167,139,250,0.2);
      padding: 3px 10px;
      border-radius: 20px;
    }

    /* ── Mode Toggle ── */
    .mode-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 20px 28px;
      margin-bottom: 14px;
    }

    .mode-label {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      margin-bottom: 14px;
    }

    .mode-toggle {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .mode-opt {
      position: relative;
      cursor: pointer;
    }

    .mode-opt input[type="radio"] {
      position: absolute;
      opacity: 0;
      width: 0; height: 0;
    }

    .mode-tile {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 16px 12px;
      border-radius: 14px;
      border: 1.5px solid var(--border);
      background: var(--surface2);
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s, transform 0.15s;
      user-select: none;
    }

    .mode-tile:hover { border-color: rgba(167,139,250,0.3); transform: translateY(-1px); }

    .mode-opt input:checked ~ .mode-tile {
      border-color: var(--ig3);
      background: rgba(131,52,175,0.1);
      box-shadow: 0 0 0 3px rgba(131,52,175,0.12), inset 0 0 20px rgba(131,52,175,0.05);
    }

    .mode-icon {
      font-size: 26px;
      line-height: 1;
    }

    .mode-name {
      font-size: 0.88rem;
      font-weight: 700;
      color: var(--text);
    }

    .mode-desc {
      font-size: 0.72rem;
      color: var(--text-muted);
      text-align: center;
      line-height: 1.4;
    }

    .mode-badge {
      font-size: 0.65rem;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 20px;
      letter-spacing: 0.06em;
    }

    .badge-mp3 { background: rgba(74,222,128,0.12); color: #4ade80; border: 1px solid rgba(74,222,128,0.25); }
    .badge-mp4 { background: rgba(96,165,250,0.12); color: #60a5fa; border: 1px solid rgba(96,165,250,0.25); }

    /* ── URL inputs ── */
    .url-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .url-row {
      display: flex;
      align-items: center;
      gap: 10px;
      animation: slideIn 0.22s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes slideOut {
      to { opacity: 0; transform: translateY(-6px); }
    }

    .url-num {
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--text-muted);
      width: 20px;
      text-align: right;
      flex-shrink: 0;
      font-variant-numeric: tabular-nums;
    }

    .url-input-wrap {
      flex: 1;
      position: relative;
    }

    .url-input-wrap .ig-icon {
      position: absolute;
      left: 12px; top: 50%;
      transform: translateY(-50%);
      font-size: 13px;
      opacity: 0.3;
      pointer-events: none;
      transition: opacity 0.2s;
    }

    .url-input-wrap:focus-within .ig-icon { opacity: 0.65; }

    input[type="url"] {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-size: 0.84rem;
      font-family: inherit;
      padding: 11px 14px 11px 34px;
      outline: none;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
    }

    input[type="url"]:focus {
      border-color: rgba(131,52,175,0.6);
      background: #1a1a2e;
      box-shadow: 0 0 0 3px rgba(131,52,175,0.1);
    }

    input[type="url"].error { border-color: rgba(248,113,113,0.6) !important; }
    input[type="url"]::placeholder { color: #2e2e48; }

    .remove-btn {
      width: 28px; height: 28px;
      flex-shrink: 0;
      background: rgba(248,113,113,0.07);
      border: 1px solid rgba(248,113,113,0.12);
      border-radius: 8px;
      color: var(--err);
      font-size: 16px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s, border-color 0.2s, opacity 0.2s;
      opacity: 0;
    }

    .url-row:hover .remove-btn { opacity: 1; }
    .remove-btn:hover { background: rgba(248,113,113,0.18); border-color: rgba(248,113,113,0.35); }

    /* ── Add more ── */
    .add-more-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 12px;
    }

    .add-more-line { flex: 1; height: 1px; background: var(--border); }

    .add-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(167,139,250,0.07);
      border: 1px solid rgba(167,139,250,0.18);
      border-radius: 20px;
      color: var(--purple);
      font-size: 0.78rem;
      font-weight: 600;
      padding: 6px 14px;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, transform 0.15s;
      font-family: inherit;
    }

    .add-btn:hover { background: rgba(167,139,250,0.14); border-color: rgba(167,139,250,0.38); transform: translateY(-1px); }
    .add-btn:active { transform: none; }
    .add-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }
    .add-btn .plus { font-size: 15px; font-weight: 400; }

    /* ── Stitch button ── */
    .stitch-btn {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--ig1) 0%, var(--ig2) 50%, var(--ig3) 100%);
      color: #fff;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 24px rgba(221,42,123,0.28);
      margin-bottom: 14px;
      position: relative;
      overflow: hidden;
    }

    .stitch-btn::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 60%);
      opacity: 0; transition: opacity 0.2s;
    }

    .stitch-btn:hover::before { opacity: 1; }
    .stitch-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(221,42,123,0.38); }
    .stitch-btn:active { transform: none; }
    .stitch-btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; box-shadow: none; }

    .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.65s linear infinite;
      display: none; flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Log card ── */
    .log-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      overflow: hidden;
      display: none;
      margin-bottom: 14px;
    }

    .log-titlebar {
      display: flex; align-items: center; gap: 7px;
      padding: 11px 16px;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
    }

    .dot { width: 10px; height: 10px; border-radius: 50%; }
    .dot-r { background: #ff5f57; } .dot-y { background: #febc2e; } .dot-g { background: #28c840; }

    .log-label { font-size: 0.72rem; font-weight: 500; color: var(--text-muted); margin-left: 4px; }

    .log-body {
      padding: 14px 16px;
      height: 220px;
      overflow-y: auto;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 0.75rem;
      line-height: 1.75;
      color: #6b6b8a;
      scrollbar-width: thin;
      scrollbar-color: #2a2a40 transparent;
    }

    .log-body::-webkit-scrollbar { width: 4px; }
    .log-body::-webkit-scrollbar-thumb { background: #2a2a40; border-radius: 4px; }

    .log-line { display: flex; gap: 10px; }
    .log-line .ts { color: #2e2e48; flex-shrink: 0; }
    .log-line.ok   .msg { color: var(--success); }
    .log-line.warn .msg { color: var(--warn); }
    .log-line.err  .msg { color: var(--err); }
    .log-line.head .msg { color: var(--purple); font-weight: 600; }

    /* ── Download card ── */
    .download-card {
      border-radius: 20px;
      padding: 28px;
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      text-align: center;
      animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1);
    }

    .download-card.audio-result {
      background: linear-gradient(135deg, rgba(74,222,128,0.06), rgba(74,222,128,0.02));
      border: 1px solid rgba(74,222,128,0.2);
    }

    .download-card.video-result {
      background: linear-gradient(135deg, rgba(96,165,250,0.06), rgba(96,165,250,0.02));
      border: 1px solid rgba(96,165,250,0.2);
    }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.92); }
      to   { opacity: 1; transform: scale(1); }
    }

    .success-icon {
      width: 54px; height: 54px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 26px;
    }

    .audio-result .success-icon { background: rgba(74,222,128,0.1); border: 1.5px solid rgba(74,222,128,0.25); }
    .video-result .success-icon { background: rgba(96,165,250,0.1); border: 1.5px solid rgba(96,165,250,0.25); }

    .download-card h3 { font-size: 1rem; font-weight: 700; }
    .audio-result h3 { color: var(--success); }
    .video-result h3 { color: #60a5fa; }

    .download-card p { font-size: 0.82rem; color: var(--text-muted); }

    .download-btn {
      display: inline-flex; align-items: center; gap: 8px;
      font-family: inherit;
      font-size: 0.88rem;
      font-weight: 700;
      padding: 12px 28px;
      border-radius: 12px;
      text-decoration: none;
      transition: transform 0.15s, filter 0.2s;
    }

    .download-btn:hover { transform: translateY(-1px); filter: brightness(1.1); }

    .audio-result .download-btn { background: var(--success); color: #000; }
    .video-result .download-btn { background: #60a5fa; color: #000; }
  </style>
</head>
<body>
  <div class="container">

    <!-- Header -->
    <div class="header">
      <div class="logo">
        <div class="logo-icon" id="logoIcon">🎵</div>
        <h1 id="appTitle">InstaStitch</h1>
      </div>
      <p class="subtitle">Paste Instagram Reel links and merge them into one file.</p>
    </div>

    <!-- Output Mode Toggle -->
    <div class="mode-card">
      <div class="mode-label">Output Format</div>
      <div class="mode-toggle">

        <label class="mode-opt">
          <input type="radio" name="mode" value="audio" checked onchange="onModeChange()" />
          <div class="mode-tile">
            <span class="mode-icon">🎵</span>
            <span class="mode-name">Audio</span>
            <span class="mode-desc">Extract &amp; merge audio tracks</span>
            <span class="mode-badge badge-mp3">MP3</span>
          </div>
        </label>

        <label class="mode-opt">
          <input type="radio" name="mode" value="video" onchange="onModeChange()" />
          <div class="mode-tile">
            <span class="mode-icon">🎬</span>
            <span class="mode-name">Video</span>
            <span class="mode-desc">Merge full reels into one clip</span>
            <span class="mode-badge badge-mp4">MP4</span>
          </div>
        </label>

      </div>
    </div>

    <!-- URL input card -->
    <div class="card">
      <div class="card-header">
        <span class="card-title">Reel Links</span>
        <span class="link-counter" id="counter">0 / 30</span>
      </div>
      <div class="url-list" id="urlList"></div>
      <div class="add-more-row">
        <div class="add-more-line"></div>
        <button class="add-btn" id="addBtn" onclick="addField()">
          <span class="plus">+</span> Add link
        </button>
        <div class="add-more-line"></div>
      </div>
    </div>

    <!-- Stitch button -->
    <button class="stitch-btn" id="stitchBtn" onclick="startStitch()">
      <span class="spinner" id="spinner"></span>
      <span id="btnLabel">✦ Stitch Audio</span>
    </button>

    <!-- Log -->
    <div class="log-card" id="logCard">
      <div class="log-titlebar">
        <div class="dot dot-r"></div>
        <div class="dot dot-y"></div>
        <div class="dot dot-g"></div>
        <span class="log-label">Processing log</span>
      </div>
      <div class="log-body" id="logBody"></div>
    </div>

    <!-- Download -->
    <div class="download-card" id="downloadCard">
      <div class="success-icon" id="dlIcon">🎧</div>
      <div>
        <h3 id="dlTitle">Your audio is ready!</h3>
        <p id="dlDesc">All reels have been merged into a single MP3.</p>
      </div>
      <a href="#" class="download-btn" id="dlBtn">⬇ Download output.mp3</a>
    </div>

  </div>

  <script>
    const MAX = 30;
    const DEFAULT = 5;
    let fieldCount = 0;

    function getMode() {
      return document.querySelector('input[name="mode"]:checked').value;
    }

    function onModeChange() {
      const mode = getMode();
      const isAudio = mode === 'audio';
      document.getElementById('logoIcon').textContent   = isAudio ? '🎵' : '🎬';
      document.getElementById('btnLabel').textContent   = isAudio ? '✦ Stitch Audio' : '✦ Stitch Video';
    }

    function updateCounter() {
      const filled = getURLs().filter(u => u).length;
      document.getElementById('counter').textContent = `${filled} / ${MAX}`;
      document.getElementById('addBtn').disabled = fieldCount >= MAX;
    }

    function addField(autofocus = true) {
      if (fieldCount >= MAX) return;
      fieldCount++;
      const n = fieldCount;
      const list = document.getElementById('urlList');
      const row = document.createElement('div');
      row.className = 'url-row';
      row.id = `row-${n}`;
      row.innerHTML = `
        <span class="url-num">${n}</span>
        <div class="url-input-wrap">
          <input type="url" id="url${n}"
            placeholder="https://www.instagram.com/reel/..."
            oninput="updateCounter()" />
          <span class="ig-icon">📎</span>
        </div>
        ${n > DEFAULT
          ? `<button class="remove-btn" onclick="removeField(${n})" title="Remove">×</button>`
          : `<div style="width:28px;flex-shrink:0"></div>`}
      `;
      list.appendChild(row);
      if (autofocus && n > DEFAULT) setTimeout(() => document.getElementById(`url${n}`)?.focus(), 50);
      updateCounter();
    }

    function removeField(n) {
      const row = document.getElementById(`row-${n}`);
      if (!row) return;
      row.style.animation = 'slideOut 0.18s ease forwards';
      setTimeout(() => { row.remove(); renumber(); updateCounter(); }, 180);
    }

    function renumber() {
      const rows = document.querySelectorAll('.url-row');
      fieldCount = rows.length;
      rows.forEach((row, i) => {
        const n = i + 1;
        row.id = `row-${n}`;
        const inp  = row.querySelector('input');
        const span = row.querySelector('.url-num');
        const btn  = row.querySelector('.remove-btn');
        if (inp)  inp.id = `url${n}`;
        if (span) span.textContent = n;
        if (btn)  btn.setAttribute('onclick', `removeField(${n})`);
      });
    }

    function getURLs() {
      return Array.from(document.querySelectorAll('.url-row input[type="url"]'))
                  .map(i => i.value.trim());
    }

    function ts() {
      const d = new Date();
      return [d.getHours(), d.getMinutes(), d.getSeconds()]
        .map(v => String(v).padStart(2, '0')).join(':');
    }

    function appendLog(text) {
      const body = document.getElementById('logBody');
      const line = document.createElement('div');
      line.className = 'log-line';
      let cls = '';
      if (/\[ERROR\]/.test(text)) cls = 'err';
      else if (/\[WARN\]/.test(text)) cls = 'warn';
      else if (/\[OK\]/.test(text)) cls = 'ok';
      else if (/^\[[\d/]+\]/.test(text)) cls = 'head';
      if (cls) line.classList.add(cls);
      line.innerHTML = `<span class="ts">${ts()}</span><span class="msg">${text}</span>`;
      body.appendChild(line);
      body.scrollTop = body.scrollHeight;
    }

    function showDownload(ext) {
      const card  = document.getElementById('downloadCard');
      const isAudio = ext === 'mp3';
      card.className = `download-card ${isAudio ? 'audio-result' : 'video-result'}`;
      document.getElementById('dlIcon').textContent  = isAudio ? '🎧' : '🎬';
      document.getElementById('dlTitle').textContent = isAudio ? 'Your audio is ready!' : 'Your video is ready!';
      document.getElementById('dlDesc').textContent  = isAudio
        ? 'All reels have been merged into a single MP3.'
        : 'All reels have been stitched into a single MP4.';
      const dlBtn = document.getElementById('dlBtn');
      dlBtn.textContent = `⬇ Download output.${ext}`;
      dlBtn.href = `/download/${ext}`;
      card.style.display = 'flex';
      card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function startStitch() {
      const urls = getURLs().filter(u => u.length > 0);
      if (urls.length === 0) {
        const first = document.getElementById('url1');
        first.classList.add('error');
        first.focus();
        setTimeout(() => first.classList.remove('error'), 1500);
        return;
      }

      const mode   = getMode();
      const btn    = document.getElementById('stitchBtn');
      const lbl    = document.getElementById('btnLabel');
      const spin   = document.getElementById('spinner');
      const logCard   = document.getElementById('logCard');
      const dlCard    = document.getElementById('downloadCard');

      btn.disabled = true;
      spin.style.display = 'block';
      lbl.textContent = 'Processing…';
      logCard.style.display = 'block';
      dlCard.style.display = 'none';
      document.getElementById('logBody').innerHTML = '';

      fetch('/stitch', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ urls: getURLs(), mode }),
      }).then(res => {
        const reader = res.body.getReader();
        const dec = new TextDecoder();
        let buf = '';

        function read() {
          reader.read().then(({ done, value }) => {
            if (done) { reset(); return; }
            buf += dec.decode(value, { stream: true });
            const lines = buf.split('\n'); buf = lines.pop();
            for (const line of lines) {
              if (!line.startsWith('data: ')) continue;
              const msg = line.slice(6);
              if (msg.startsWith('DONE:')) {
                reset();
                showDownload(msg.split(':')[1]); // 'mp3' or 'mp4'
              } else {
                appendLog(msg);
              }
            }
            read();
          });
        }
        read();
      }).catch(err => {
        appendLog(`[ERROR] ${err}`);
        reset();
      });

      function reset() {
        btn.disabled = false;
        spin.style.display = 'none';
        lbl.textContent = getMode() === 'audio' ? '✦ Stitch Audio' : '✦ Stitch Video';
      }
    }

    // Init
    for (let i = 0; i < DEFAULT; i++) addField(false);
  </script>
</body>
</html>
