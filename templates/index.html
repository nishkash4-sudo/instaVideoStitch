<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>InstaStitch</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

    :root {
      --ig1: #f58529;
      --ig2: #dd2a7b;
      --ig3: #8134af;
      --ig4: #515bd4;
      --bg: #07070f;
      --surface: #0d0d1c;
      --surface2: #13132a;
      --surface3: #1a1a30;
      --border: rgba(255,255,255,0.06);
      --border-bright: rgba(255,255,255,0.1);
      --text: #eeeef8;
      --text-muted: #5a5a7a;
      --text-dim: #3a3a55;
      --success: #4ade80;
      --warn: #facc15;
      --err: #f87171;
      --purple: #a78bfa;
      --blue: #60a5fa;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Ambient orbs ── */
    .orb {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
      filter: blur(80px);
    }
    .orb-1 {
      width: 500px; height: 500px;
      top: -150px; left: -100px;
      background: radial-gradient(circle, rgba(131,52,175,0.14) 0%, transparent 70%);
    }
    .orb-2 {
      width: 400px; height: 400px;
      top: 200px; right: -100px;
      background: radial-gradient(circle, rgba(221,42,123,0.1) 0%, transparent 70%);
    }
    .orb-3 {
      width: 350px; height: 350px;
      bottom: 100px; left: 30%;
      background: radial-gradient(circle, rgba(81,91,212,0.1) 0%, transparent 70%);
    }

    /* ── Page wrapper ── */
    .page {
      position: relative;
      z-index: 1;
      max-width: 1140px;
      margin: 0 auto;
      padding: 0 24px 80px;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 32px 0 40px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 36px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-icon {
      width: 42px; height: 42px;
      background: linear-gradient(135deg, var(--ig1), var(--ig2), var(--ig3));
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      box-shadow: 0 0 28px rgba(221,42,123,0.3);
      flex-shrink: 0;
    }

    .logo-text h1 {
      font-size: 1.35rem;
      font-weight: 800;
      background: linear-gradient(90deg, var(--ig1), var(--ig2), var(--ig3), var(--ig4));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.4px;
      line-height: 1.2;
    }

    .logo-text p {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .header-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border-bright);
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 0.73rem;
      color: var(--text-muted);
    }

    .header-badge .dot-live {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--success);
      box-shadow: 0 0 6px var(--success);
      animation: pulse 2s ease infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }

    /* ── Two-column layout ── */
    .workspace {
      display: grid;
      grid-template-columns: 380px 1fr;
      grid-template-rows: auto;
      gap: 20px;
      align-items: start;
    }

    /* ── Left panel ── */
    .left-panel {
      display: flex;
      flex-direction: column;
      gap: 14px;
      position: sticky;
      top: 24px;
    }

    /* ── Right panel ── */
    .right-panel {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    /* ── Section label ── */
    .section-label {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--text-muted);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── Panel card ── */
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      overflow: hidden;
    }

    .panel-body {
      padding: 20px 22px;
    }

    /* ── Mode toggle ── */
    .mode-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .mode-opt {
      position: relative;
      cursor: pointer;
    }

    .mode-opt input[type="radio"] {
      position: absolute;
      opacity: 0; width: 0; height: 0;
    }

    .mode-tile {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 7px;
      padding: 16px 10px;
      border-radius: 14px;
      border: 1.5px solid var(--border);
      background: var(--surface2);
      transition: all 0.2s;
      user-select: none;
      position: relative;
      overflow: hidden;
    }

    .mode-tile::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, var(--ig1), var(--ig3));
      opacity: 0;
      transition: opacity 0.2s;
    }

    .mode-tile:hover { border-color: rgba(167,139,250,0.3); transform: translateY(-1px); }

    .mode-opt input:checked ~ .mode-tile {
      border-color: var(--ig3);
      background: rgba(131,52,175,0.08);
      box-shadow: 0 0 0 3px rgba(131,52,175,0.1),
                  inset 0 1px 0 rgba(255,255,255,0.05);
    }

    .mode-tile-content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .mode-checkmark {
      position: absolute;
      top: 8px; right: 8px;
      width: 16px; height: 16px;
      border-radius: 50%;
      background: var(--ig3);
      display: flex; align-items: center; justify-content: center;
      font-size: 9px;
      color: white;
      opacity: 0;
      transition: opacity 0.2s;
      z-index: 2;
    }

    .mode-opt input:checked ~ .mode-tile .mode-checkmark { opacity: 1; }

    .mode-icon { font-size: 24px; line-height: 1; }
    .mode-name { font-size: 0.84rem; font-weight: 700; }
    .mode-desc { font-size: 0.68rem; color: var(--text-muted); text-align: center; line-height: 1.4; }

    .mode-badge {
      font-size: 0.62rem;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 20px;
      letter-spacing: 0.06em;
    }

    .badge-mp3 { background: rgba(74,222,128,0.12); color: #4ade80; border: 1px solid rgba(74,222,128,0.25); }
    .badge-mp4 { background: rgba(96,165,250,0.12); color: #60a5fa; border: 1px solid rgba(96,165,250,0.25); }

    /* ── Bulk paste ── */
    .bulk-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      overflow: hidden;
      transition: border-color 0.2s;
    }

    .bulk-card.drag-over {
      border-color: rgba(131,52,175,0.5);
    }

    .bulk-body { padding: 20px 22px; }

    .bulk-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .bulk-meta {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .bulk-hint-pill {
      font-size: 0.67rem;
      color: var(--text-dim);
      background: var(--surface3);
      border: 1px solid var(--border);
      padding: 2px 8px;
      border-radius: 8px;
    }

    .bulk-clear {
      font-size: 0.7rem;
      color: var(--text-muted);
      background: none;
      border: none;
      cursor: pointer;
      font-family: inherit;
      display: none;
      transition: color 0.15s;
    }
    .bulk-clear:hover { color: var(--err); }

    .bulk-textarea {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-size: 0.78rem;
      font-family: 'SF Mono', 'Fira Code', monospace;
      line-height: 1.7;
      padding: 11px 13px;
      outline: none;
      resize: none;
      height: 110px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .bulk-textarea:focus {
      border-color: rgba(131,52,175,0.5);
      box-shadow: 0 0 0 3px rgba(131,52,175,0.08);
    }

    .bulk-textarea::placeholder { color: var(--text-dim); }

    .bulk-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 10px;
    }

    .bulk-count {
      font-size: 0.7rem;
      color: var(--text-dim);
      transition: color 0.2s;
    }
    .bulk-count.has-links { color: var(--purple); }

    .bulk-import-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      background: linear-gradient(135deg, rgba(245,133,41,0.12), rgba(131,52,175,0.12));
      border: 1px solid rgba(131,52,175,0.22);
      border-radius: 9px;
      color: var(--text);
      font-size: 0.76rem;
      font-weight: 600;
      padding: 7px 14px;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.18s;
    }

    .bulk-import-btn:hover {
      background: linear-gradient(135deg, rgba(245,133,41,0.22), rgba(131,52,175,0.22));
      border-color: rgba(131,52,175,0.4);
      transform: translateY(-1px);
    }

    .bulk-import-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

    /* ── Stitch button (left panel bottom) ── */
    .stitch-btn {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 15px;
      background: linear-gradient(135deg, var(--ig1) 0%, var(--ig2) 50%, var(--ig3) 100%);
      color: #fff;
      font-family: inherit;
      font-size: 0.97rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      transition: all 0.2s;
      box-shadow: 0 4px 20px rgba(221,42,123,0.25);
      position: relative;
      overflow: hidden;
    }

    .stitch-btn::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.18) 0%, transparent 55%);
      opacity: 0; transition: opacity 0.2s;
    }

    .stitch-btn:hover::before { opacity: 1; }
    .stitch-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(221,42,123,0.35); }
    .stitch-btn:active { transform: none; }
    .stitch-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }

    .spinner {
      width: 17px; height: 17px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.65s linear infinite;
      display: none; flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── URL card (right panel) ── */
    .url-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      overflow: hidden;
    }

    .url-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--surface2);
    }

    .url-card-title {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
    }

    .link-counter {
      font-size: 0.7rem;
      font-weight: 700;
      color: var(--purple);
      background: rgba(167,139,250,0.1);
      border: 1px solid rgba(167,139,250,0.18);
      padding: 3px 10px;
      border-radius: 20px;
    }

    .url-scroll-area {
      max-height: 480px;
      overflow-y: auto;
      padding: 14px 18px;
      scrollbar-width: thin;
      scrollbar-color: #1e1e35 transparent;
    }

    .url-scroll-area::-webkit-scrollbar { width: 4px; }
    .url-scroll-area::-webkit-scrollbar-thumb { background: #1e1e35; border-radius: 4px; }

    .url-list {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .url-row {
      display: flex;
      align-items: center;
      gap: 8px;
      animation: rowIn 0.2s ease;
    }

    @keyframes rowIn  { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: none; } }
    @keyframes rowOut { to   { opacity: 0; transform: translateY(-5px); } }

    .url-num {
      font-size: 0.68rem;
      font-weight: 600;
      color: var(--text-dim);
      width: 18px;
      text-align: right;
      flex-shrink: 0;
      font-variant-numeric: tabular-nums;
    }

    .url-input-wrap {
      flex: 1;
      position: relative;
    }

    .url-input-wrap .ig-icon {
      position: absolute;
      left: 11px; top: 50%;
      transform: translateY(-50%);
      font-size: 12px;
      opacity: 0.25;
      pointer-events: none;
      transition: opacity 0.2s;
    }

    .url-input-wrap:focus-within .ig-icon { opacity: 0.6; }

    input[type="url"] {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 0.8rem;
      font-family: inherit;
      padding: 9px 12px 9px 30px;
      outline: none;
      transition: all 0.18s;
    }

    input[type="url"]:focus {
      border-color: rgba(131,52,175,0.55);
      background: #161630;
      box-shadow: 0 0 0 3px rgba(131,52,175,0.08);
    }

    input[type="url"].shake {
      animation: shake 0.35s ease;
      border-color: rgba(248,113,113,0.5);
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%       { transform: translateX(-5px); }
      60%       { transform: translateX(5px); }
    }

    input[type="url"]::placeholder { color: var(--text-dim); }

    .remove-btn {
      width: 26px; height: 26px;
      flex-shrink: 0;
      background: rgba(248,113,113,0.06);
      border: 1px solid rgba(248,113,113,0.1);
      border-radius: 7px;
      color: var(--err);
      font-size: 14px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
      opacity: 0;
    }

    .url-row:hover .remove-btn { opacity: 1; }
    .remove-btn:hover { background: rgba(248,113,113,0.16); border-color: rgba(248,113,113,0.3); }

    /* ── Add row ── */
    .add-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 18px 16px;
      border-top: 1px solid var(--border);
    }

    .add-line { flex: 1; height: 1px; background: var(--border); }

    .add-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      background: rgba(167,139,250,0.06);
      border: 1px solid rgba(167,139,250,0.15);
      border-radius: 20px;
      color: var(--purple);
      font-size: 0.73rem;
      font-weight: 600;
      padding: 5px 13px;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
    }

    .add-btn:hover { background: rgba(167,139,250,0.13); border-color: rgba(167,139,250,0.35); transform: translateY(-1px); }
    .add-btn:active { transform: none; }
    .add-btn:disabled { opacity: 0.25; cursor: not-allowed; transform: none; }

    /* ── Full-width bottom area ── */
    .bottom-area {
      margin-top: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    /* ── Log card ── */
    .log-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      overflow: hidden;
      display: none;
    }

    .log-titlebar {
      display: flex; align-items: center; gap: 7px;
      padding: 10px 16px;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
    }

    .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .dot-r { background: #ff5f57; } .dot-y { background: #febc2e; } .dot-g { background: #28c840; }

    .log-label { font-size: 0.7rem; font-weight: 500; color: var(--text-muted); margin-left: 4px; }

    .log-body {
      padding: 14px 18px;
      height: 200px;
      overflow-y: auto;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 0.74rem;
      line-height: 1.75;
      color: var(--text-muted);
      scrollbar-width: thin;
      scrollbar-color: #1e1e35 transparent;
    }

    .log-body::-webkit-scrollbar { width: 4px; }
    .log-body::-webkit-scrollbar-thumb { background: #1e1e35; border-radius: 4px; }

    .log-line { display: flex; gap: 10px; }
    .log-line .ts  { color: var(--text-dim); flex-shrink: 0; }
    .log-line.ok   .msg { color: var(--success); }
    .log-line.warn .msg { color: var(--warn); }
    .log-line.err  .msg { color: var(--err); }
    .log-line.head .msg { color: var(--purple); font-weight: 600; }

    /* ── Download card ── */
    .download-card {
      border-radius: 18px;
      padding: 0;
      display: none;
      overflow: hidden;
      animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1);
    }

    @keyframes popIn { from { opacity:0; transform:scale(0.94); } to { opacity:1; transform:scale(1); } }

    .download-card.audio-result { border: 1px solid rgba(74,222,128,0.18); }
    .download-card.video-result { border: 1px solid rgba(96,165,250,0.18); }

    .download-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 22px 28px;
      gap: 20px;
    }

    .audio-result .download-inner {
      background: linear-gradient(135deg, rgba(74,222,128,0.06) 0%, rgba(74,222,128,0.02) 100%);
    }
    .video-result .download-inner {
      background: linear-gradient(135deg, rgba(96,165,250,0.06) 0%, rgba(96,165,250,0.02) 100%);
    }

    .download-left { display: flex; align-items: center; gap: 16px; }

    .dl-icon {
      width: 50px; height: 50px;
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .audio-result .dl-icon { background: rgba(74,222,128,0.1); border: 1px solid rgba(74,222,128,0.2); }
    .video-result .dl-icon { background: rgba(96,165,250,0.1); border: 1px solid rgba(96,165,250,0.2); }

    .dl-text h3 { font-size: 0.95rem; font-weight: 700; margin-bottom: 2px; }
    .audio-result .dl-text h3 { color: var(--success); }
    .video-result .dl-text h3 { color: var(--blue); }

    .dl-text p { font-size: 0.78rem; color: var(--text-muted); }

    .download-btn {
      display: inline-flex; align-items: center; gap: 8px;
      font-family: inherit;
      font-size: 0.85rem;
      font-weight: 700;
      padding: 12px 24px;
      border-radius: 12px;
      text-decoration: none;
      white-space: nowrap;
      flex-shrink: 0;
      transition: transform 0.15s, filter 0.2s;
    }

    .download-btn:hover { transform: translateY(-1px); filter: brightness(1.08); }
    .audio-result .download-btn { background: var(--success); color: #000; }
    .video-result .download-btn { background: var(--blue); color: #000; }

    /* ── Flash animation for URL card ── */
    @keyframes flashBorder {
      0%   { box-shadow: 0 0 0 2px rgba(74,222,128,0.5); }
      100% { box-shadow: none; }
    }
    .flash { animation: flashBorder 0.7s ease; }

    /* ── Responsive ── */
    @media (max-width: 780px) {
      .workspace { grid-template-columns: 1fr; }
      .left-panel { position: static; }
      .header { flex-direction: column; gap: 12px; text-align: center; }
      .download-inner { flex-direction: column; text-align: center; }
      .download-left { flex-direction: column; }
    }
  </style>
</head>
<body>

  <!-- Ambient orbs -->
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <div class="page">

    <!-- ── Header ── -->
    <div class="header">
      <div class="logo">
        <div class="logo-icon" id="logoIcon">🎵</div>
        <div class="logo-text">
          <h1>InstaStitch</h1>
          <p>Instagram Reel merger · local tool</p>
        </div>
      </div>
      <div class="header-badge">
        <div class="dot-live"></div>
        Running locally on :8080
      </div>
    </div>

    <!-- ── Two-column workspace ── -->
    <div class="workspace">

      <!-- ════ LEFT PANEL ════ -->
      <div class="left-panel">

        <!-- Output format -->
        <div class="section-label">Output Format</div>
        <div class="panel">
          <div class="panel-body">
            <div class="mode-grid">
              <label class="mode-opt">
                <input type="radio" name="mode" value="audio" checked onchange="onModeChange()" />
                <div class="mode-tile">
                  <div class="mode-checkmark">✓</div>
                  <div class="mode-tile-content">
                    <span class="mode-icon">🎵</span>
                    <span class="mode-name">Audio</span>
                    <span class="mode-desc">Extract &amp; merge audio tracks</span>
                    <span class="mode-badge badge-mp3">MP3</span>
                  </div>
                </div>
              </label>
              <label class="mode-opt">
                <input type="radio" name="mode" value="video" onchange="onModeChange()" />
                <div class="mode-tile">
                  <div class="mode-checkmark">✓</div>
                  <div class="mode-tile-content">
                    <span class="mode-icon">🎬</span>
                    <span class="mode-name">Video</span>
                    <span class="mode-desc">Merge full reels into one clip</span>
                    <span class="mode-badge badge-mp4">MP4</span>
                  </div>
                </div>
              </label>
            </div>
          </div>
        </div>

        <!-- Bulk paste -->
        <div class="section-label">Bulk Paste</div>
        <div class="bulk-card" id="bulkCard">
          <div class="bulk-body">
            <div class="bulk-header">
              <div class="bulk-meta">
                <span class="bulk-hint-pill">newline · space · comma</span>
              </div>
              <button class="bulk-clear" id="bulkClearBtn" onclick="clearBulk()">✕ Clear</button>
            </div>
            <textarea
              class="bulk-textarea"
              id="bulkInput"
              placeholder="Paste all your links here…&#10;&#10;https://www.instagram.com/reel/ABC…&#10;https://www.instagram.com/reel/DEF…"
              oninput="onBulkInput()"
            ></textarea>
            <div class="bulk-footer">
              <span class="bulk-count" id="bulkCount">Paste links above to detect</span>
              <button class="bulk-import-btn" id="bulkImportBtn" onclick="importBulk()" disabled>
                ↓ Import into fields
              </button>
            </div>
          </div>
        </div>

        <!-- Stitch button -->
        <button class="stitch-btn" id="stitchBtn" onclick="startStitch()">
          <span class="spinner" id="spinner"></span>
          <span id="btnLabel">✦ Stitch Audio</span>
        </button>

      </div><!-- /left-panel -->

      <!-- ════ RIGHT PANEL ════ -->
      <div class="right-panel">
        <div class="section-label">Reel Links</div>
        <div class="url-card" id="urlCard">
          <div class="url-card-header">
            <span class="url-card-title">Instagram Reel URLs</span>
            <span class="link-counter" id="counter">0 / 30</span>
          </div>
          <div class="url-scroll-area">
            <div class="url-list" id="urlList"></div>
          </div>
          <div class="add-row">
            <div class="add-line"></div>
            <button class="add-btn" id="addBtn" onclick="addField()">
              + Add link
            </button>
            <div class="add-line"></div>
          </div>
        </div>
      </div><!-- /right-panel -->

    </div><!-- /workspace -->

    <!-- ── Full-width bottom ── -->
    <div class="bottom-area">

      <!-- Log -->
      <div class="log-card" id="logCard">
        <div class="log-titlebar">
          <div class="dot dot-r"></div>
          <div class="dot dot-y"></div>
          <div class="dot dot-g"></div>
          <span class="log-label">Processing log</span>
        </div>
        <div class="log-body" id="logBody"></div>
      </div>

      <!-- Download -->
      <div class="download-card" id="downloadCard">
        <div class="download-inner">
          <div class="download-left">
            <div class="dl-icon" id="dlIcon">🎧</div>
            <div class="dl-text">
              <h3 id="dlTitle">Your audio is ready!</h3>
              <p id="dlDesc">All reels merged into a single MP3.</p>
            </div>
          </div>
          <a href="#" class="download-btn" id="dlBtn">⬇ Download output.mp3</a>
        </div>
      </div>

    </div>

  </div><!-- /page -->

  <script>
    const MAX = 30;
    const DEFAULT = 5;
    let fieldCount = 0;

    function getMode() {
      return document.querySelector('input[name="mode"]:checked').value;
    }

    function onModeChange() {
      const isAudio = getMode() === 'audio';
      document.getElementById('logoIcon').textContent = isAudio ? '🎵' : '🎬';
      document.getElementById('btnLabel').textContent = isAudio ? '✦ Stitch Audio' : '✦ Stitch Video';
    }

    function updateCounter() {
      const filled = getURLs().filter(u => u).length;
      document.getElementById('counter').textContent = `${filled} / ${MAX}`;
      document.getElementById('addBtn').disabled = fieldCount >= MAX;
    }

    function addField(autofocus = true) {
      if (fieldCount >= MAX) return;
      fieldCount++;
      const n = fieldCount;
      const list = document.getElementById('urlList');
      const row = document.createElement('div');
      row.className = 'url-row';
      row.id = `row-${n}`;
      row.innerHTML = `
        <span class="url-num">${n}</span>
        <div class="url-input-wrap">
          <input type="url" id="url${n}"
            placeholder="https://www.instagram.com/reel/..."
            oninput="updateCounter()" />
          <span class="ig-icon">📎</span>
        </div>
        ${n > DEFAULT
          ? `<button class="remove-btn" onclick="removeField(${n})" title="Remove">×</button>`
          : `<div style="width:26px;flex-shrink:0"></div>`}
      `;
      list.appendChild(row);
      if (autofocus && n > DEFAULT) setTimeout(() => document.getElementById(`url${n}`)?.focus(), 50);
      updateCounter();
    }

    function removeField(n) {
      const row = document.getElementById(`row-${n}`);
      if (!row) return;
      row.style.animation = 'rowOut 0.18s ease forwards';
      setTimeout(() => { row.remove(); renumber(); updateCounter(); }, 180);
    }

    function renumber() {
      const rows = document.querySelectorAll('.url-row');
      fieldCount = rows.length;
      rows.forEach((row, i) => {
        const n = i + 1;
        row.id = `row-${n}`;
        const inp  = row.querySelector('input');
        const span = row.querySelector('.url-num');
        const btn  = row.querySelector('.remove-btn');
        if (inp)  inp.id = `url${n}`;
        if (span) span.textContent = n;
        if (btn)  btn.setAttribute('onclick', `removeField(${n})`);
      });
    }

    function getURLs() {
      return Array.from(document.querySelectorAll('.url-row input[type="url"]'))
                  .map(i => i.value.trim());
    }

    function ts() {
      return new Date().toTimeString().slice(0,8);
    }

    function appendLog(text) {
      const body = document.getElementById('logBody');
      const line = document.createElement('div');
      line.className = 'log-line';
      let cls = '';
      if (/\[ERROR\]/.test(text)) cls = 'err';
      else if (/\[WARN\]/.test(text))  cls = 'warn';
      else if (/\[OK\]/.test(text))    cls = 'ok';
      else if (/^\[[\d/]+\]/.test(text)) cls = 'head';
      if (cls) line.classList.add(cls);
      line.innerHTML = `<span class="ts">${ts()}</span><span class="msg">${text}</span>`;
      body.appendChild(line);
      body.scrollTop = body.scrollHeight;
    }

    function showDownload(ext) {
      const card  = document.getElementById('downloadCard');
      const isAudio = ext === 'mp3';
      card.className = `download-card ${isAudio ? 'audio-result' : 'video-result'}`;
      document.getElementById('dlIcon').textContent  = isAudio ? '🎧' : '🎬';
      document.getElementById('dlTitle').textContent = isAudio ? 'Your audio is ready!' : 'Your video is ready!';
      document.getElementById('dlDesc').textContent  = isAudio
        ? 'All reels merged into a single MP3.'
        : 'All reels stitched into a single MP4.';
      const btn = document.getElementById('dlBtn');
      btn.textContent = `⬇ Download output.${ext}`;
      btn.href = `/download/${ext}`;
      card.style.display = 'block';
      card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function startStitch() {
      const urls = getURLs().filter(u => u.length > 0);
      if (urls.length === 0) {
        const first = document.getElementById('url1');
        first.classList.add('shake');
        first.focus();
        setTimeout(() => first.classList.remove('shake'), 400);
        return;
      }

      const mode = getMode();
      const btn  = document.getElementById('stitchBtn');
      const lbl  = document.getElementById('btnLabel');
      const spin = document.getElementById('spinner');

      btn.disabled = true;
      spin.style.display = 'block';
      lbl.textContent = 'Processing…';
      document.getElementById('logCard').style.display = 'block';
      document.getElementById('downloadCard').style.display = 'none';
      document.getElementById('logBody').innerHTML = '';

      fetch('/stitch', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ urls: getURLs(), mode }),
      }).then(res => {
        const reader = res.body.getReader();
        const dec = new TextDecoder();
        let buf = '';

        function read() {
          reader.read().then(({ done, value }) => {
            if (done) { reset(); return; }
            buf += dec.decode(value, { stream: true });
            const lines = buf.split('\n'); buf = lines.pop();
            for (const line of lines) {
              if (!line.startsWith('data: ')) continue;
              const msg = line.slice(6);
              if (msg.startsWith('DONE:')) {
                reset();
                showDownload(msg.split(':')[1]);
              } else {
                appendLog(msg);
              }
            }
            read();
          });
        }
        read();
      }).catch(err => {
        appendLog(`[ERROR] ${err}`);
        reset();
      });

      function reset() {
        btn.disabled = false;
        spin.style.display = 'none';
        lbl.textContent = getMode() === 'audio' ? '✦ Stitch Audio' : '✦ Stitch Video';
      }
    }

    /* ── Bulk paste ── */
    function parseBulkLinks(raw) {
      return raw.split(/[\s,]+/).map(s => s.trim()).filter(s => s.startsWith('http'));
    }

    function onBulkInput() {
      const raw   = document.getElementById('bulkInput').value;
      const links = parseBulkLinks(raw);
      const count = document.getElementById('bulkCount');
      const btn   = document.getElementById('bulkImportBtn');
      const clr   = document.getElementById('bulkClearBtn');

      clr.style.display = raw.trim() ? 'inline' : 'none';

      if (!links.length) {
        count.textContent = 'Paste links above to detect';
        count.classList.remove('has-links');
        btn.disabled = true;
      } else {
        count.textContent = links.length > MAX
          ? `${links.length} links — first ${MAX} will be imported`
          : `${links.length} link${links.length !== 1 ? 's' : ''} detected`;
        count.classList.add('has-links');
        btn.disabled = false;
      }
    }

    function importBulk() {
      const links = parseBulkLinks(document.getElementById('bulkInput').value).slice(0, MAX);
      if (!links.length) return;

      document.getElementById('urlList').innerHTML = '';
      fieldCount = 0;

      const total = Math.max(links.length, DEFAULT);
      for (let i = 0; i < total; i++) addField(false);

      document.querySelectorAll('.url-row input[type="url"]').forEach((inp, i) => {
        if (links[i]) inp.value = links[i];
      });

      updateCounter();

      const card = document.getElementById('urlCard');
      card.classList.add('flash');
      setTimeout(() => card.classList.remove('flash'), 800);
      card.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function clearBulk() {
      document.getElementById('bulkInput').value = '';
      onBulkInput();
    }

    // Drag & drop text onto bulk card
    const bulkCard = document.getElementById('bulkCard');
    bulkCard.addEventListener('dragover',  e => { e.preventDefault(); bulkCard.classList.add('drag-over'); });
    bulkCard.addEventListener('dragleave', () => bulkCard.classList.remove('drag-over'));
    bulkCard.addEventListener('drop', e => {
      e.preventDefault();
      bulkCard.classList.remove('drag-over');
      const text = e.dataTransfer.getData('text');
      if (text) { document.getElementById('bulkInput').value = text; onBulkInput(); }
    });

    // Init default fields
    for (let i = 0; i < DEFAULT; i++) addField(false);
  </script>
</body>
</html>
