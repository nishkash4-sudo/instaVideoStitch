<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>InstaAudioStitch</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

    :root {
      --ig1: #f58529;
      --ig2: #dd2a7b;
      --ig3: #8134af;
      --ig4: #515bd4;
      --bg: #080810;
      --surface: #0f0f1a;
      --surface2: #161625;
      --border: rgba(255,255,255,0.07);
      --border-focus: rgba(131,52,175,0.6);
      --text: #f0f0f8;
      --text-muted: #6b6b8a;
      --success: #4ade80;
      --warn: #facc15;
      --err: #f87171;
      --purple: #a78bfa;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 16px 80px;
      overflow-x: hidden;
    }

    /* ── ambient glow ── */
    body::before {
      content: '';
      position: fixed;
      top: -200px; left: 50%;
      transform: translateX(-50%);
      width: 800px; height: 500px;
      background: radial-gradient(ellipse, rgba(131,52,175,0.18) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 620px;
      padding-top: 56px;
    }

    /* ── header ── */
    .header {
      text-align: center;
      margin-bottom: 40px;
    }

    .logo {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }

    .logo-icon {
      width: 44px; height: 44px;
      background: linear-gradient(135deg, var(--ig1), var(--ig2), var(--ig3));
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      box-shadow: 0 0 24px rgba(221,42,123,0.35);
    }

    h1 {
      font-size: 1.7rem;
      font-weight: 800;
      background: linear-gradient(90deg, var(--ig1), var(--ig2), var(--ig3), var(--ig4));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
    }

    .subtitle {
      color: var(--text-muted);
      font-size: 0.88rem;
      font-weight: 400;
      line-height: 1.5;
    }

    /* ── card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 28px;
      margin-bottom: 16px;
      backdrop-filter: blur(12px);
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .card-title {
      font-size: 0.78rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
    }

    .link-counter {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--purple);
      background: rgba(167,139,250,0.1);
      border: 1px solid rgba(167,139,250,0.2);
      padding: 3px 10px;
      border-radius: 20px;
    }

    /* ── url inputs ── */
    .url-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .url-row {
      display: flex;
      align-items: center;
      gap: 10px;
      animation: slideIn 0.25s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .url-num {
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--text-muted);
      width: 20px;
      text-align: right;
      flex-shrink: 0;
      font-variant-numeric: tabular-nums;
    }

    .url-input-wrap {
      flex: 1;
      position: relative;
    }

    .url-input-wrap .ig-icon {
      position: absolute;
      left: 12px; top: 50%;
      transform: translateY(-50%);
      font-size: 14px;
      opacity: 0.35;
      pointer-events: none;
      transition: opacity 0.2s;
    }

    input[type="url"] {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-size: 0.84rem;
      font-family: inherit;
      padding: 11px 14px 11px 36px;
      outline: none;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
    }

    input[type="url"]:focus {
      border-color: var(--border-focus);
      background: #1a1a2e;
      box-shadow: 0 0 0 3px rgba(131,52,175,0.12);
    }

    input[type="url"]:focus + .ig-icon,
    .url-input-wrap:focus-within .ig-icon {
      opacity: 0.7;
    }

    input[type="url"]::placeholder { color: #3a3a55; }

    .remove-btn {
      width: 28px; height: 28px;
      flex-shrink: 0;
      background: rgba(248,113,113,0.08);
      border: 1px solid rgba(248,113,113,0.15);
      border-radius: 8px;
      color: var(--err);
      font-size: 16px;
      line-height: 1;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s, border-color 0.2s;
      opacity: 0;
    }

    .url-row:hover .remove-btn { opacity: 1; }
    .remove-btn:hover { background: rgba(248,113,113,0.18); border-color: rgba(248,113,113,0.35); }

    /* ── add more button ── */
    .add-more-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 12px;
    }

    .add-more-line {
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .add-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(167,139,250,0.08);
      border: 1px solid rgba(167,139,250,0.2);
      border-radius: 20px;
      color: var(--purple);
      font-size: 0.78rem;
      font-weight: 600;
      padding: 6px 14px;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, transform 0.15s;
      font-family: inherit;
    }

    .add-btn:hover { background: rgba(167,139,250,0.15); border-color: rgba(167,139,250,0.4); transform: translateY(-1px); }
    .add-btn:active { transform: translateY(0); }
    .add-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }
    .add-btn .plus { font-size: 16px; font-weight: 300; }

    /* ── stitch button ── */
    .stitch-btn {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--ig1) 0%, var(--ig2) 50%, var(--ig3) 100%);
      color: #fff;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 24px rgba(221,42,123,0.3);
      margin-bottom: 16px;
      position: relative;
      overflow: hidden;
    }

    .stitch-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 60%);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .stitch-btn:hover::before { opacity: 1; }
    .stitch-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(221,42,123,0.4); }
    .stitch-btn:active { transform: translateY(0); }
    .stitch-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

    /* ── spinner ── */
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.65s linear infinite;
      display: none;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── log card ── */
    .log-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      overflow: hidden;
      display: none;
      margin-bottom: 16px;
    }

    .log-titlebar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 18px;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
    }

    .dot { width: 10px; height: 10px; border-radius: 50%; }
    .dot-red   { background: #ff5f57; }
    .dot-yellow{ background: #febc2e; }
    .dot-green { background: #28c840; }

    .log-label {
      font-size: 0.73rem;
      font-weight: 500;
      color: var(--text-muted);
      margin-left: 4px;
    }

    .log-body {
      padding: 16px 18px;
      height: 220px;
      overflow-y: auto;
      font-family: 'SF Mono', 'Fira Code', 'Courier New', monospace;
      font-size: 0.76rem;
      line-height: 1.7;
      color: #8888aa;
      scrollbar-width: thin;
      scrollbar-color: #2a2a40 transparent;
    }

    .log-body::-webkit-scrollbar { width: 4px; }
    .log-body::-webkit-scrollbar-track { background: transparent; }
    .log-body::-webkit-scrollbar-thumb { background: #2a2a40; border-radius: 4px; }

    .log-line { display: flex; gap: 8px; }
    .log-line .ts { color: #3a3a55; flex-shrink: 0; }
    .log-line.ok   .msg { color: var(--success); }
    .log-line.warn .msg { color: var(--warn); }
    .log-line.err  .msg { color: var(--err); }
    .log-line.head .msg { color: var(--purple); font-weight: 600; }

    /* ── download card ── */
    .download-card {
      background: linear-gradient(135deg, rgba(74,222,128,0.06), rgba(74,222,128,0.02));
      border: 1px solid rgba(74,222,128,0.2);
      border-radius: 20px;
      padding: 24px 28px;
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      text-align: center;
      animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1);
    }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.92); }
      to   { opacity: 1; transform: scale(1); }
    }

    .success-icon {
      width: 52px; height: 52px;
      background: rgba(74,222,128,0.12);
      border: 1.5px solid rgba(74,222,128,0.3);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 24px;
    }

    .download-card h3 {
      font-size: 1rem;
      font-weight: 700;
      color: var(--success);
    }

    .download-card p {
      font-size: 0.82rem;
      color: var(--text-muted);
    }

    .download-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--success);
      color: #000;
      font-family: inherit;
      font-size: 0.88rem;
      font-weight: 700;
      padding: 12px 28px;
      border-radius: 12px;
      text-decoration: none;
      transition: background 0.2s, transform 0.15s;
    }

    .download-btn:hover { background: #86efac; transform: translateY(-1px); }
  </style>
</head>
<body>
  <div class="container">

    <!-- Header -->
    <div class="header">
      <div class="logo">
        <div class="logo-icon">🎵</div>
        <h1>InstaAudioStitch</h1>
      </div>
      <p class="subtitle">Paste Instagram Reel links and merge their audio into one MP3 file.</p>
    </div>

    <!-- URL input card -->
    <div class="card">
      <div class="card-header">
        <span class="card-title">Reel Links</span>
        <span class="link-counter" id="counter">0 / 30</span>
      </div>

      <div class="url-list" id="urlList"></div>

      <div class="add-more-row" id="addMoreRow">
        <div class="add-more-line"></div>
        <button class="add-btn" id="addBtn" onclick="addField()">
          <span class="plus">+</span> Add link
        </button>
        <div class="add-more-line"></div>
      </div>
    </div>

    <!-- Stitch button -->
    <button class="stitch-btn" id="stitchBtn" onclick="startStitch()">
      <span class="spinner" id="spinner"></span>
      <span id="btnLabel">✦ Stitch Audio</span>
    </button>

    <!-- Log card -->
    <div class="log-card" id="logCard">
      <div class="log-titlebar">
        <div class="dot dot-red"></div>
        <div class="dot dot-yellow"></div>
        <div class="dot dot-green"></div>
        <span class="log-label">Processing log</span>
      </div>
      <div class="log-body" id="logBody"></div>
    </div>

    <!-- Download card -->
    <div class="download-card" id="downloadCard">
      <div class="success-icon">🎧</div>
      <div>
        <h3>Your audio is ready!</h3>
        <p>All reels have been merged into a single MP3.</p>
      </div>
      <a href="/download" class="download-btn">⬇ Download output.mp3</a>
    </div>

  </div>

  <script>
    const MAX = 30;
    const DEFAULT = 5;
    let fieldCount = 0;

    function updateCounter() {
      const filled = getURLs().filter(u => u).length;
      document.getElementById('counter').textContent = `${filled} / ${MAX}`;
      document.getElementById('addBtn').disabled = fieldCount >= MAX;
    }

    function addField(autofocus = true) {
      if (fieldCount >= MAX) return;
      fieldCount++;

      const list = document.getElementById('urlList');
      const row = document.createElement('div');
      row.className = 'url-row';
      row.id = `row-${fieldCount}`;

      const n = fieldCount;
      row.innerHTML = `
        <span class="url-num">${n}</span>
        <div class="url-input-wrap">
          <input type="url" id="url${n}"
            placeholder="https://www.instagram.com/reel/..."
            oninput="updateCounter()" />
          <span class="ig-icon">📎</span>
        </div>
        ${n > DEFAULT ? `<button class="remove-btn" onclick="removeField(${n})" title="Remove">×</button>` : '<div style="width:28px;flex-shrink:0"></div>'}
      `;

      list.appendChild(row);
      if (autofocus && n > DEFAULT) {
        setTimeout(() => document.getElementById(`url${n}`).focus(), 50);
      }
      updateCounter();
    }

    function removeField(n) {
      const row = document.getElementById(`row-${n}`);
      if (row) {
        row.style.animation = 'slideOut 0.18s ease forwards';
        setTimeout(() => {
          row.remove();
          fieldCount--;
          renumberFields();
          updateCounter();
        }, 180);
      }
    }

    // Add slide-out keyframe dynamically
    const style = document.createElement('style');
    style.textContent = `@keyframes slideOut {
      to { opacity: 0; transform: translateY(-6px); max-height: 0; margin: 0; padding: 0; }
    }`;
    document.head.appendChild(style);

    function renumberFields() {
      const rows = document.querySelectorAll('.url-row');
      fieldCount = rows.length;
      rows.forEach((row, i) => {
        const num = i + 1;
        row.id = `row-${num}`;
        const inp = row.querySelector('input');
        const span = row.querySelector('.url-num');
        if (inp) { inp.id = `url${num}`; }
        if (span) span.textContent = num;
        const rmBtn = row.querySelector('.remove-btn');
        if (rmBtn) rmBtn.setAttribute('onclick', `removeField(${num})`);
      });
    }

    function getURLs() {
      const inputs = document.querySelectorAll('.url-row input[type="url"]');
      return Array.from(inputs).map(i => i.value.trim());
    }

    function nowStr() {
      const d = new Date();
      return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')}`;
    }

    function appendLog(text) {
      const body = document.getElementById('logBody');
      const line = document.createElement('div');
      line.className = 'log-line';

      let cls = '';
      if (text.startsWith('[ERROR]') || text.includes('[ERROR]')) cls = 'err';
      else if (text.startsWith('[WARN]') || text.includes('[WARN]')) cls = 'warn';
      else if (text.startsWith('[OK]') || text.includes('[OK]')) cls = 'ok';
      else if (/^\[[\d/]+\]/.test(text)) cls = 'head';
      if (cls) line.classList.add(cls);

      line.innerHTML = `<span class="ts">${nowStr()}</span><span class="msg">${text}</span>`;
      body.appendChild(line);
      body.scrollTop = body.scrollHeight;
    }

    function startStitch() {
      const urls = getURLs().filter(u => u.length > 0);
      if (urls.length === 0) {
        document.getElementById('url1').focus();
        document.getElementById('url1').style.borderColor = 'rgba(248,113,113,0.6)';
        setTimeout(() => document.getElementById('url1').style.borderColor = '', 1500);
        return;
      }

      const btn   = document.getElementById('stitchBtn');
      const lbl   = document.getElementById('btnLabel');
      const spin  = document.getElementById('spinner');
      const logCard  = document.getElementById('logCard');
      const dlCard   = document.getElementById('downloadCard');

      btn.disabled = true;
      spin.style.display = 'block';
      lbl.textContent = 'Processing…';
      logCard.style.display = 'block';
      dlCard.style.display = 'none';
      document.getElementById('logBody').innerHTML = '';

      fetch('/stitch', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ urls: getURLs() }),
      }).then(res => {
        const reader = res.body.getReader();
        const dec = new TextDecoder();
        let buf = '';

        function read() {
          reader.read().then(({ done, value }) => {
            if (done) {
              btn.disabled = false;
              spin.style.display = 'none';
              lbl.textContent = '✦ Stitch Audio';
              return;
            }
            buf += dec.decode(value, { stream: true });
            const lines = buf.split('\n');
            buf = lines.pop();
            for (const line of lines) {
              if (!line.startsWith('data: ')) continue;
              const msg = line.slice(6);
              if (msg === 'DONE') {
                btn.disabled = false;
                spin.style.display = 'none';
                lbl.textContent = '✦ Stitch Audio';
                dlCard.style.display = 'flex';
                dlCard.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
              } else {
                appendLog(msg);
              }
            }
            read();
          });
        }
        read();
      }).catch(err => {
        appendLog(`[ERROR] ${err}`);
        btn.disabled = false;
        spin.style.display = 'none';
        lbl.textContent = '✦ Stitch Audio';
      });
    }

    // Init default fields
    for (let i = 0; i < DEFAULT; i++) addField(false);
  </script>
</body>
</html>
